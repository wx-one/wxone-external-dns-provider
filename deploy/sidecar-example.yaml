apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns-wx1
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-dns-wx1
  template:
    metadata:
      labels:
        app: external-dns-wx1
    spec:
      serviceAccountName: external-dns-wx1
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.15.0
          args:
            - --provider=webhook
            - --webhook-provider-url=http://127.0.0.1:8888
            - --source=ingress
            - --namespace=default
            - --domain-filter=test123.de
            - --registry=txt
            - --txt-owner-id=wx1
        - name: wx1-webhook
          image: wxone/external-dns-webhook-wx1:dev
          imagePullPolicy: Always
          env:
            - name: WX1_HOST
              value: https://cmd.wx1.eu/api
            - name: WX1_API_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: wx1-dns01-auth
                  key: username
            - name: WX1_API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: wx1-dns01-auth
                  key: password
            - name: WX1_TENANT
              value: wizardtales.com
            - name: WX1_DOMAIN_FILTERS
              value: test123.de
            - name: WX1_AUTH_CACHE_TTL
              value: 4h
